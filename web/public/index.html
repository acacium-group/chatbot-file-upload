<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="/images/BotServices.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Web Chat Upload to Azure Storage Demo</title>

    <style>
      /* Ensure suggested action labels are wrapped */
      .webchat__suggested-action__text {
        white-space: wrap !important;
      }
  
      /* Optional: Adjust button height and padding */
      .webchat__suggested-action__button {
        height: auto !important;
        padding: 10px;
      }
    </style>

    <!-- Load Bot Framework Web Chat script for embedding web chat interface -->
    <script
      crossorigin="anonymous"
      integrity="sha384-4LcbsBbx9Pr+/7Hm0HxHOuhHMFlbf4ecmHUekoAnbBRiURTJx3HaaLuo7PrP1aBD"
      src="https://cdn.botframework.com/botframework-webchat/4.16.0/webchat.js"
    ></script>

    <!-- Load Azure Storage Blob script for interacting with Azure Blob storage in the browser -->
    <script
      src="https://unpkg.com/@azure/storage-blob@10.3.0/browser/azure-storage.blob.min.js"
      integrity="sha384-fsfhtLyVQo3L3Bh73qgQoRR328xEeXnRGdoi53kjo1uectCfAHFfavrBBN2Nkbdf"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <!-- Fallback message for users with JavaScript disabled -->
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Placeholder for the web chat interface -->
    <div id="webchat"></div>

    <!-- Add Start Chat button -->
    <button id="startChatButton">Start Chat</button>

    <script>
      // Helper function to fetch JSON data from a specified URL with optional configurations
      async function fetchJSON(url, options = {}) {
        const res = await fetch(url, {
          ...options,
          headers: {
            ...options.headers,
            accept: "application/json"
          }
        });

        if (!res.ok) {
          console.error(`Failed to fetch JSON from ${url} - Status: ${res.status}`);
          throw new Error(`Failed to fetch JSON due to ${res.status}`);
        }

        return await res.json();
      }

      function hideUploadButton() {
        const uploadButton = document.querySelector('.webchat__upload-button');
        if (uploadButton) {
          uploadButton.style.display = 'none';
        }
      }

      function showUploadButton() {
        const uploadButton = document.querySelector('.webchat__upload-button');
        if (uploadButton) {
          uploadButton.style.display = 'block';
        }
      }

      // Function to upload a file to Azure Storage using a secure SAS token
      async function uploadFile({ name, url }) {
        const res = await fetch(url);

        if (!res.ok) {
          console.error(`Failed to obtain ArrayBuffer from ${url}`);
          throw new Error("Cannot obtain ArrayBuffer to upload file");
        }

        const metadata = { "x-ms-meta-name": name };
        const extension = name.substring(name.lastIndexOf("."));

        // Request SAS token from server, passing file extension
        const { sasQuery, url: uploadURL } = await fetchJSON(`/api/azurestorage/uploadsastoken?extension=${encodeURIComponent(extension)}`);

        // Create pipeline and blob URL for file upload
        const pipeline = azblob.StorageURL.newPipeline(new azblob.AnonymousCredential());
        const blockBlobURL = new azblob.BlockBlobURL(`${uploadURL}?${sasQuery}`, pipeline);

        // Upload file data using the SAS token
        await azblob.uploadBrowserDataToBlockBlob(azblob.Aborter.none, await res.arrayBuffer(), blockBlobURL);

        return uploadURL; // Return blob URL upon successful upload
      }

      // Function to initialize Web Chat
      async function initializeWebChat() {
        
        const store = WebChat.createStore({}, ({ dispatch }) => (next) => (action) => {
          const { type } = action;

          if (type === "DIRECT_LINE/CONNECT_FULFILLED") {
            dispatch({
              type: "WEB_CHAT/SEND_EVENT",
              payload: {
                name: "startConversation",
                type: "event",
                value: { text: "hello" }
              }
            });

            hideUploadButton();
            return next(action);
          } else if (type === "WEB_CHAT/SEND_FILES") {
            (async function () {
              dispatch({ type: "WEB_CHAT/SEND_TYPING" });

              const allowedExtensions = [".pdf", ".doc", ".docx"];
              const fileNames = action.payload.files.map((file) => file.name);

              const validFiles = action.payload.files.filter((file) => {
                const extension = file.name.substring(file.name.lastIndexOf(".")).toLowerCase();
                return allowedExtensions.includes(extension);
              });

              if (fileNames.length > 1) {
                dispatch({
                  type: "DIRECT_LINE/INCOMING_ACTIVITY",
                  payload: {
                    activity: {
                      from: { id: "bot", name: "Agent" },
                      type: "message",
                      text: "You have selected multiple files. Please only select a single file for upload.",
                      id: Math.random().toString(36).substr(2)
                    }
                  }
                });
              } else if (validFiles.length === 0) {
                dispatch({
                  type: "DIRECT_LINE/INCOMING_ACTIVITY",
                  payload: {
                    activity: {
                      from: { id: "bot", name: "Agent" },
                      type: "message",
                      text: "Invalid file type. Only PDF, DOC, and DOCX files are allowed.",
                      id: Math.random().toString(36).substr(2)
                    }
                  }
                });
              } else {
                const files = await Promise.all(
                  action.payload.files.map(({ name, url }) => uploadFile({ name, url }))
                );

                hideUploadButton();

                const blobFullName = files[0].substring(files[0].lastIndexOf("/") + 1);

                dispatch({
                  type: "WEB_CHAT/SEND_EVENT",
                  payload: {
                    name: "ChatbotUploadEvent",
                    type: "event",
                    value: `${fileNames[0]}|${blobFullName}`
                  }
                });
              }
            })().catch((err) => console.error(err));
          } else if (type === "DIRECT_LINE/INCOMING_ACTIVITY" && action.payload.activity.name === "showUploadButton") {
            showUploadButton();
            return next(action);
          } else {
            return next(action);
          }
        });

        const { token } = await fetchJSON("/api/directline/token");
        WebChat.renderWebChat(
          {
            directLine: WebChat.createDirectLine({ token }),
            store,
            styleOptions: {
              backgroundColor: "rgba(255, 255, 255, .8)"
            }
          },
          document.getElementById("webchat")
        );
      }

      // Attach event listener to Start Chat button
      document.getElementById("startChatButton").addEventListener("click", () => {
        // Hide the Start Chat button
        document.getElementById("startChatButton").style.display = "none";
        initializeWebChat().catch((err) => console.error(err));
      });
    </script>
  </body>
</html>
